name: Daily Model Retraining & Batch Predict

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      use_local:
        description: 'Use local CSV instead of Supabase'
        required: false
        default: 'false'

jobs:
  retrain:
    name: Retrain & Evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run Batch Retraining ──────────────────────────────────────────────
      - name: Run Batch Retraining
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event.inputs.use_local }}" = "true" ]; then
            echo "Using local CSV dataset..."
            python batch_process.py --local
          else
            python batch_process.py
          fi

      # ── 5. Run Batch Prediction on training dataset (smoke test) ─────────────
      - name: Run Batch Prediction (smoke test)
        run: |
          python batch_predict.py \
            --input Dataset/noshowappointments-kagglev2-may-2016.csv \
            --output results/batch_predictions_latest.csv \
            --batch-size 5000
        continue-on-error: true   # Don't fail the pipeline if dataset isn't in repo

      # ── 6. Upload prediction results as artifact ─────────────────────────────
      - name: Upload prediction results
        uses: actions/upload-artifact@v4
        with:
          name: batch-predictions-${{ github.run_number }}
          path: results/
          retention-days: 30
        if: success()

      # ── 7. Upload training log ────────────────────────────────────────────────
      - name: Upload training log
        uses: actions/upload-artifact@v4
        with:
          name: training-log-${{ github.run_number }}
          path: batch_training.log
          retention-days: 30
        if: always()

      # ── 8. Commit updated model back to repo ─────────────────────────────────
      - name: Commit and push updated model
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add models/metrics.json
          # Note: large .joblib files are excluded by .gitignore
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: automated model update $(date +'%Y-%m-%d')" && git push
